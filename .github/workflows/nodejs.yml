name: Node.js CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        run: npm install

      # 4️⃣ Run tests (CI part)
      - name: Run Tests
        run: npm test

      # 5️⃣ Build step (simulated)
      - name: Build App
        run: echo "Building application... DONE"

      # 6️⃣ Deploy step (CD simulation)
      - name: Deploy Application
        run: |
          echo "Deploying application..."

          # create deploy folder
          mkdir -p deploy

          # copy only required files (SAFE WAY)
          cp app.js deploy/
          cp package.json deploy/
          cp package-lock.json deploy/

          echo "Deployment successful 🚀"

      # 7️⃣ Verify deployment
      - name: Verify Deployment
        run: |
          cd deploy
          node -v
          echo "App deployed successfully"
